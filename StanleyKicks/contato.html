<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StanleyKicks - Contato</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>StanleyKicks</h1>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="conteudo-interno">
      <h2>Entre em Contato</h2>

      <form action="#" method="post" class="formulario">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>

        <button type="submit">Enviar</button>

      </form>
    </section>

    <section class="conteudo-interno">
      <h2>Informações</h2>
      <address>
        <p>Rua dos Tênis, 123 — AV/Rio Verde, Goiânia/GO</p>
        <p>Telefone: (62) 4002-8922</p>
        <p>E-mail: contato@stanleykicks.com.br</p>
        <p>Horário: Seg a Sáb, das 9h às 20h</p>
      </address>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 StanleyKicks. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
