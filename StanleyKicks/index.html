<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StanleyKicks - Início</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>StanleyKicks</h1>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="banner">
      <img src="img/loja.jpg" alt="Fachada da loja StanleyKicks" />
      <div class="banner-texto">
        <h2>Os melhores tênis estão aqui</h2>
        <p>Qualidade, estilo e conforto para o seu dia a dia.</p>
      </div>
    </section>

    <section class="produtos">
      <h2>Nossos Produtos</h2>

      <div class="grade-produtos">

        <article class="card">
          <img src="img/tenis1.jpg" alt="Air Jordan 1 low" />
          <h3>Air Jordan 1 low</h3>
          <p class="preco">R$ 499,90</p>
          <button type="button">Comprar</button>
        </article>

        <article class="card">
          <img src="img/tenis2.jpg" alt="Nike revolution 8" />
          <h3>Nike revolution 8</h3>
          <p class="preco">R$ 249,90</p>
          <button type="button">Comprar</button>
        </article>

        <article class="card">
          <img src="img/tenis3.jpg" alt="Nike Air Zoom" />
          <h3>Nike Air Zoom</h3>
          <p class="preco">R$ 799,90</p>
          <button type="button">Comprar</button>
        </article>

      </div>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 StanleyKicks. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
